name: CI

on:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - run: npm run lint

      - run: npm run test:run
